<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0ea5e9">
    <title>BarInventory</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

        @import url('https://fonts.googleapis.com/css2?family=Figtree:wght@400;500;600;700&amp;family=JetBrains+Mono:wght@400;500;600&amp;display=swap');

<body class="bg-zinc-950 text-white font-figtree">

    <!-- LOGIN SCREEN -->
    <div id="loginScreen" class="fixed inset-0 bg-zinc-950 flex items-center justify-center z-[9999] hidden">
        <div class="login-card max-w-md w-full mx-4">
            <!-- ... contenido del login sin cambios ... -->
            <div class="text-center">
                <div class="login-logo">
                    <div class="login-logo-icon">📦</div>
                    <div>
                        <div class="login-logo-text">BarInventory</div>
                        <div class="login-logo-sub">Control de Inventario</div>
                    </div>
                </div>
                <h1 class="login-title">Bienvenido de vuelta</h1>
                <p class="login-subtitle">Ingresa tus credenciales para acceder al sistema.</p>
                
                <div class="login-field">
                    <label class="login-label">Correo electrónico</label>
                    <input id="loginEmail" type="email" class="login-input" placeholder="tu@email.com">
                </div>
                <div class="login-field">
                    <label class="login-label">Contraseña</label>
                    <input id="loginPassword" type="password" class="login-input" placeholder="••••••••">
                </div>
                
                <button onclick="window.loginUser()" class="login-btn">
                    Iniciar sesión
                    <span id="loginSpinner" class="login-spinner hidden"></span>
                </button>
                
                <div id="loginError" class="login-error"></div>
            </div>
        </div>
    </div>

    <!-- APP WRAPPER -->
    <div id="appWrapper" class="min-h-screen flex flex-col">
        
        <!-- HEADER -->
        <div class="bg-zinc-900 border-b border-zinc-800 px-6 py-4 flex items-center justify-between sticky top-0 z-50">
            <div class="flex items-center gap-3">
                <div class="w-9 h-9 bg-sky-500 rounded-2xl flex items-center justify-center text-2xl">📦</div>
                <div>
                    <h1 class="text-2xl font-bold tracking-tight">BarInventory</h1>
                    <p class="text-xs text-zinc-500 -mt-1">Control de Inventario</p>
                </div>
            </div>
            <div class="flex items-center gap-4">
                <div id="networkStatus" class="text-xs font-medium flex items-center gap-1.5 px-3 py-1 rounded-3xl bg-amber-500/10 text-amber-400">
                    <div class="w-2 h-2 bg-amber-400 rounded-full animate-pulse"></div>
                    SINCRONIZANDO
                </div>
                <div onclick="toggleTheme()" class="cursor-pointer text-xl">☀️</div>
                <div onclick="logout()" class="cursor-pointer text-xl">🚪</div>
            </div>
        </div>

        <!-- MAIN CONTENT -->
        <div class="flex-1 overflow-auto pb-20" id="mainContent">
            
            <!-- TAB: INICIO -->
            <div id="homeTab" class="tab-content p-6">
                <h2 class="text-3xl font-bold mb-2">¡Hola de nuevo!</h2>
                <p class="text-zinc-400">¿Qué deseas hacer hoy?</p>
                <!-- contenido existente sin cambios -->
            </div>

            <!-- TAB: PRODUCTOS -->
            <div id="productsTab" class="tab-content hidden p-6">
                <!-- contenido existente sin cambios -->
            </div>

            <!-- TAB: PEDIDOS -->
            <div id="ordersTab" class="tab-content hidden p-6">
                <!-- contenido existente sin cambios -->
            </div>

            <!-- TAB: INVENTARIO -->
            <div id="inventoryTab" class="tab-content hidden p-6">
                <!-- contenido existente sin cambios -->
            </div>

            <!-- TAB: HISTORIA -->
            <div id="historyTab" class="tab-content hidden p-6">
                <!-- contenido existente sin cambios -->
            </div>

            <!-- TAB: NOTIFICACIONES -->
            <div id="notificationsTab" class="tab-content hidden p-6">
                <!-- contenido existente sin cambios -->
            </div>

            <!-- TAB: AJUSTES -->
            <div id="ajustesTab" class="tab-content hidden p-6">
                <!-- contenido existente sin cambios -->
            </div>

            <!-- █████████████████████████████████████████████████████████████ -->
            <!-- TAB: AUDITORÍA (ÚNICO BLOQUE ACTUALIZADO) -->
            <!-- █████████████████████████████████████████████████████████████ -->
            <div id="auditTab" class="tab-content hidden">
                <div class="p-6">
                    <h2 class="text-2xl font-bold mb-6 flex items-center gap-3">
                        🔎 Auditoría Física Ciega
                    </h2>
                    
                    <!-- Contenedor donde render.js dibujará las tarjetas de área -->
                    <div id="auditContainer" class="space-y-4"></div>
                    
                    <!-- Botón "Marcar área como COMPLETADA" (solo aparece cuando hay un área seleccionada) -->
                    <div id="areaCompleteBar" class="hidden mt-8">
                        <button onclick="markAreaCompleted(state.selectedArea)" 
                                class="audit-finish-btn w-full py-4 text-lg font-semibold rounded-3xl flex items-center justify-center gap-2">
                            ✅ Marcar esta área como <strong>COMPLETADA</strong>
                        </button>
                    </div>

                    <!-- Botón Admin: Iniciar Nuevo Ciclo (se muestra automáticamente en renderAuditTab) -->
                </div>
            </div>
            <!-- █████████████████████████████████████████████████████████████ -->

        </div>

        <!-- BOTTOM NAVIGATION -->
        <div id="bottomNav" class="fixed bottom-0 left-0 right-0 bg-zinc-900 border-t border-zinc-800 h-16 flex items-center z-50">
            <!-- ... bottom nav sin cambios ... -->
        </div>

        <!-- MODALES (TODOS SIN CAMBIOS) -->
        <!-- Product Modal -->
        <div id="productModal" class="hidden fixed inset-0 bg-black/70 flex items-end md:items-center justify-center z-[9999]">
            <!-- ... modal producto sin cambios ... -->
        </div>

        <!-- Order Modal -->
        <div id="orderModal" class="hidden fixed inset-0 bg-black/70 flex items-end md:items-center justify-center z-[9999]">
            <!-- ... modal pedido sin cambios ... -->
        </div>

        <!-- Inventario Modal -->
        <div id="inventarioModal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-[9999]">
            <!-- ... modal inventario sin cambios ... -->
        </div>

    </div>

    <!-- TOAST -->
    <div id="toast" class="hidden fixed bottom-6 left-1/2 -translate-x-1/2 z-[10000]"></div>

    <script src="js/constants.js"></script>
    <script src="js/storage.js"></script>

    <script src="js/products.js"></script>

    <script src="js/audit.js"></script>           <!-- ← NUEVO ARCHIVO -->
    <script src="js/render.js"></script>
