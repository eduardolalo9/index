
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BarInventory</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <!-- Firebase Compat SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
    <script src="firebase-config.js"></script>
    <link rel="manifest" href="manifest.json">
    <style>
        /* Tus estilos originales + los nuevos de auditoría (mantengo todo lo que ya tenías) */
        @import url('https://fonts.googleapis.com/css2?family=Figtree:wght@400;500;600;700&amp;family=JetBrains+Mono:wght@400;500;600&amp;display=swap');
        :root {
            --accent: #0a84ff;
            --accent-hover: #0066cc;
        }
        /* ... (todos tus estilos anteriores se mantienen exactamente igual) ... */
    </style>
</head>
<body class="bg-zinc-950 text-white font-figtree">

<!-- LOGIN SCREEN (se mantiene igual) -->
<div id="loginScreen" class="fixed inset-0 bg-zinc-950 flex items-center justify-center z-[9999]">
    <!-- tu login original completo -->
    <div class="login-card">
        <!-- ... tu código de login sin cambios ... -->
    </div>
</div>

<!-- APP WRAPPER -->
<div id="appWrapper" class="min-h-screen pb-20">

    <!-- HEADER Y SIDEBAR (se mantiene igual) -->
    <!-- ... tu header y sidebar original ... -->

    <!-- CONTENIDO PRINCIPAL -->
    <main class="p-4 md:p-6">

        <!-- TAB INICIO, PRODUCTOS, PEDIDOS, etc. (se mantienen igual) -->

        <!-- NUEVA SECCIÓN: AUDITORÍA FÍSICA CIEGA MULTIUSUARIO (añadida completa) -->
        <div id="auditScreen" class="audit-screen tab-content hidden">
            <div class="max-w-4xl mx-auto">
                <div class="flex justify-between items-start mb-6">
                    <div>
                        <h2 class="text-2xl font-bold">Auditoría Física Ciega</h2>
                        <p class="text-zinc-400 text-sm">Conteo multiusuario • Cada bartender cuenta por su cuenta</p>
                    </div>
                    <!-- Solo Admin: Iniciar nuevo ciclo -->
                    <button onclick="startNewCycle()" 
                            class="admin-only px-6 py-3 bg-gradient-to-r from-emerald-600 to-teal-600 text-white font-semibold rounded-2xl flex items-center gap-2 hover:brightness-110 transition">
                        <span class="text-xl">🔄</span>
                        <span>Iniciar Nuevo Ciclo</span>
                    </button>
                </div>

                <!-- Tarjetas de áreas -->
                <div class="grid grid-cols-1 sm:grid-cols-3 gap-4 mb-8">
                    <div onclick="switchArea('almacen')" id="area-card-almacen"
                         class="audit-area-card cursor-pointer bg-zinc-900 border border-zinc-800 rounded-3xl p-6 hover:border-blue-500 transition-all">
                        <div class="flex items-center gap-4">
                            <div class="w-14 h-14 bg-blue-500/10 text-blue-500 rounded-2xl flex items-center justify-center text-3xl">📦</div>
                            <div class="flex-1">
                                <div class="font-semibold text-lg">Almacén</div>
                                <div id="status-almacen" class="text-xs font-bold uppercase tracking-widest px-3 py-1 bg-amber-500/10 text-amber-400 rounded-full inline-flex items-center gap-1">⏳ Pendiente</div>
                            </div>
                            <div class="text-3xl text-zinc-500">→</div>
                        </div>
                    </div>

                    <div onclick="switchArea('barra1')" id="area-card-barra1"
                         class="audit-area-card cursor-pointer bg-zinc-900 border border-zinc-800 rounded-3xl p-6 hover:border-blue-500 transition-all">
                        <div class="flex items-center gap-4">
                            <div class="w-14 h-14 bg-orange-500/10 text-orange-500 rounded-2xl flex items-center justify-center text-3xl">🍾</div>
                            <div class="flex-1">
                                <div class="font-semibold text-lg">Barra 1</div>
                                <div id="status-barra1" class="text-xs font-bold uppercase tracking-widest px-3 py-1 bg-amber-500/10 text-amber-400 rounded-full inline-flex items-center gap-1">⏳ Pendiente</div>
                            </div>
                            <div class="text-3xl text-zinc-500">→</div>
                        </div>
                    </div>

                    <div onclick="switchArea('barra2')" id="area-card-barra2"
                         class="audit-area-card cursor-pointer bg-zinc-900 border border-zinc-800 rounded-3xl p-6 hover:border-blue-500 transition-all">
                        <div class="flex items-center gap-4">
                            <div class="w-14 h-14 bg-purple-500/10 text-purple-500 rounded-2xl flex items-center justify-center text-3xl">🍷</div>
                            <div class="flex-1">
                                <div class="font-semibold text-lg">Barra 2</div>
                                <div id="status-barra2" class="text-xs font-bold uppercase tracking-widest px-3 py-1 bg-amber-500/10 text-amber-400 rounded-full inline-flex items-center gap-1">⏳ Pendiente</div>
                            </div>
                            <div class="text-3xl text-zinc-500">→</div>
                        </div>
                    </div>
                </div>

                <!-- Botón Finalizar Área (se muestra después de conteo) -->
                <button onclick="finalizeArea(state.selectedArea)" 
                        id="finish-area-btn"
                        class="hidden w-full py-5 text-lg font-bold bg-gradient-to-r from-blue-600 to-blue-500 rounded-3xl text-white flex items-center justify-center gap-3 hover:brightness-110 transition">
                    ✅ Finalizar Área y Bloquear mi Conteo
                </button>

                <!-- Panel Admin: Reaperturas -->
                <div id="admin-reopen-panel" class="admin-only hidden mt-10 bg-zinc-900 border border-zinc-800 rounded-3xl p-6">
                    <h3 class="font-bold mb-4 text-lg">Reabrir conteos de usuarios</h3>
                    <div id="reopen-list" class="space-y-3">
                        <!-- renderizado dinámicamente por render.js -->
                    </div>
                </div>

                <!-- Botón Publicar Reporte Final (solo admin) -->
                <button onclick="publishFinalReport()" 
                        class="admin-only w-full mt-8 py-5 text-lg font-bold bg-gradient-to-r from-emerald-600 to-teal-600 rounded-3xl text-white flex items-center justify-center gap-3 hover:brightness-110 transition">
                    📤 Publicar Reporte Final de Auditoría
                </button>
            </div>
        </div>

        <!-- El resto de tu HTML original (Productos, Pedidos, Inventario, Historia, etc.) se mantiene exactamente igual -->
        <!-- ... resto de tu código HTML sin cambios ... -->

    </main>

    <!-- BOTTOM NAV (se mantiene igual) -->
    <!-- ... tu bottom nav original ... -->

</div>

<script src="js/state.js"></script>
<script src="js/storage.js"></script>
<script src="js/ui.js"></script>
<script src="js/products.js"></script>
<script src="js/constants.js"></script>
<script src="js/actions.js"></script>
<script src="js/render.js"></script>
<script src="js/sync.js"></script>

</body>
</html>
