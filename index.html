<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Control de Inventario - Barra</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        /* ================================================
           VARIABLES — POST FEED DESIGN SYSTEM
           ================================================ */
        :root {
            /* Brand palette */
            --ink:         #0b0c10;
            --surface:     #13141a;
            --card:        #1a1b23;
            --card-hover:  #1f2030;
            --border:      rgba(255,255,255,0.07);
            --border-mid:  rgba(255,255,255,0.12);

            /* Accent colours */
            --accent:      #6c63ff;
            --accent-2:    #ff6b6b;
            --accent-3:    #ffd166;
            --accent-green:#06d6a0;
            --accent-blue: #4cc9f0;

            /* Text */
            --txt-primary:   #f0f0f5;
            --txt-secondary: #8b8ca8;
            --txt-muted:     #50516a;

            /* Glow / shadows */
            --glow-accent: 0 0 24px rgba(108,99,255,0.22);
            --shadow-card: 0 2px 12px rgba(0,0,0,0.40), 0 1px 3px rgba(0,0,0,0.30);
            --shadow-modal: 0 32px 80px rgba(0,0,0,0.65), 0 8px 24px rgba(0,0,0,0.40);

            --ease-spring: cubic-bezier(0.34, 1.56, 0.64, 1);
            --ease-out:    cubic-bezier(0.22, 1, 0.36, 1);
            --ease-in-out: cubic-bezier(0.65, 0, 0.35, 1);
        }

        /* ================================================
           BASE
           ================================================ */
        *, *::before, *::after { box-sizing: border-box; }
        html { scroll-behavior: smooth; }

        body {
            font-family: 'Outfit', system-ui, -apple-system, sans-serif;
            font-weight: 400;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            background-color: var(--ink);
            color: var(--txt-primary);
            min-height: 100vh;
            /* Subtle noise texture feel */
            background-image:
                radial-gradient(ellipse 80% 50% at 20% -10%, rgba(108,99,255,0.12) 0%, transparent 60%),
                radial-gradient(ellipse 60% 40% at 80% 110%, rgba(255,107,107,0.07) 0%, transparent 55%);
        }

        /* ================================================
           SCROLLBAR
           ================================================ */
        ::-webkit-scrollbar            { width: 4px; height: 4px; }
        ::-webkit-scrollbar-track      { background: transparent; }
        ::-webkit-scrollbar-thumb      { background: rgba(108,99,255,0.35); border-radius: 99px; }
        ::-webkit-scrollbar-thumb:hover{ background: rgba(108,99,255,0.6); }

        /* ================================================
           KEYFRAMES
           ================================================ */
        @keyframes fadeIn {
            from { opacity: 0; }
            to   { opacity: 1; }
        }
        @keyframes springUp {
            0%   { opacity: 0; transform: translateY(72px) scale(0.91); }
            52%  { opacity: 1; transform: translateY(-8px) scale(1.015); }
            76%  { transform: translateY(4px) scale(0.997); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }
        @keyframes backdropReveal {
            /* CORRECCIÓN BUG 1: backdrop-filter no es animable en @keyframes (spec violation).
               Se mantiene como propiedad estática en el selector del modal. */
            from { opacity: 0; }
            to   { opacity: 1; }
        }
        @keyframes slideIn {
            from { transform: scaleX(0); opacity: 0; }
            to   { transform: scaleX(1); opacity: 1; }
        }
        @keyframes toastPop {
            0%   { opacity: 0; transform: translateX(-50%) translateY(32px) scale(0.86); }
            56%  { opacity: 1; transform: translateX(-50%) translateY(-6px) scale(1.04); }
            100% { opacity: 1; transform: translateX(-50%) translateY(0) scale(1); }
        }
        @keyframes pulse {
            0%,100% { opacity: 1; transform: scale(1); }
            50%      { opacity: 0.4; transform: scale(0.8); }
        }
        @keyframes tabContentIn {
            from { opacity: 0; transform: translateY(12px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        @keyframes rowIn {
            from { opacity: 0; transform: translateX(-8px); }
            to   { opacity: 1; transform: translateX(0); }
        }
        /* CORRECCIÓN BUG 2: tres animaciones sin uso (postSlide, borderPulse, shimmer)
           estaban declaradas pero nunca referenciadas. Eliminadas. */

        /* ================================================
           ANIMATION UTILITY CLASSES
           ================================================ */
        .animate-fadeIn  { animation: fadeIn  0.22s ease-out both; }
        .animate-slideIn {
            animation: slideIn 0.26s var(--ease-spring) both;
            transform-origin: left;
        }
        .animate-slideUp { animation: springUp 0.46s var(--ease-spring) both; }
        .animate-pulse   { animation: pulse 2s ease-in-out infinite; }

        #tabContent { animation: tabContentIn 0.30s var(--ease-out) both; }

        /* ================================================
           HIDDEN
           ================================================ */
        .hidden { display: none !important; }

        /* ================================================
           HEADER — dark glass bar
           ================================================ */
        body > .sticky.top-0 {
            background: linear-gradient(135deg, #1e1740 0%, #12173d 40%, #1a1020 100%) !important;
            border-bottom: 1px solid var(--border-mid) !important;
            box-shadow: 0 4px 24px rgba(0,0,0,0.50), 0 1px 0 rgba(108,99,255,0.25) !important;
        }
        body > .sticky.top-0 h1 {
            font-family: 'Syne', sans-serif !important;
            font-weight: 800 !important;
            letter-spacing: -0.03em !important;
            background: linear-gradient(120deg, #ffffff 30%, rgba(108,99,255,0.85) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            /* CORRECCIÓN BUG 7: Firefox no soporta -webkit-text-fill-color.
               color:transparent garantiza el efecto gradient en todos los navegadores. */
            color: transparent !important;
        }
        body > .sticky.top-0 p {
            color: var(--txt-secondary) !important;
            font-family: 'Outfit', sans-serif !important;
            font-size: 0.75rem !important;
        }

        /* ================================================
           TAB BAR — dark surface, pill active state
           ================================================ */
        .bg-white.shadow-sm.sticky {
            background: var(--surface) !important;
            border-bottom: 1px solid var(--border) !important;
            box-shadow: none !important;
        }
        .tab-btn {
            font-family: 'Outfit', sans-serif !important;
            font-weight: 500 !important;
            font-size: 0.875rem !important;
            color: var(--txt-secondary) !important;
            letter-spacing: 0 !important;
            padding: 14px 16px !important;
            transition: color 0.18s ease !important;
        }
        .tab-btn.text-gray-900,
        .tab-btn:has(.tab-indicator) {
            color: var(--txt-primary) !important;
        }
        .tab-btn:hover { color: var(--txt-primary) !important; }
        .tab-indicator {
            animation: slideIn 0.26s var(--ease-spring) both !important;
            transform-origin: left !important;
            background: linear-gradient(90deg, var(--accent), var(--accent-2)) !important;
            height: 2px !important;
            border-radius: 0 !important;
        }

        /* ================================================
           BODY CONTENT AREA
           ================================================ */
        .max-w-7xl.mx-auto.px-3 { padding-top: 1.5rem !important; padding-bottom: 3rem !important; }

        /* ================================================
           TAILWIND COLOUR OVERRIDES — force dark palette
           ================================================ */
        .bg-white       { background-color: var(--card)    !important; }
        .bg-gray-50     { background-color: var(--surface) !important; }
        .bg-gray-100    { background-color: #1f2030        !important; }
        .text-gray-900  { color: var(--txt-primary)   !important; }
        .text-gray-600  { color: var(--txt-secondary) !important; }
        .text-gray-500  { color: var(--txt-secondary) !important; }
        .text-gray-400  { color: var(--txt-muted)     !important; }
        .text-gray-700  { color: var(--txt-secondary) !important; }
        .border-gray-200{ border-color: var(--border)  !important; }
        .divide-gray-200 > * + * { border-color: var(--border) !important; }
        .border-gray-300{ border-color: var(--border-mid) !important; }

        /* ================================================
           POST CARDS — the core post-feed style
           ================================================ */
        .bg-white.rounded-xl,
        .bg-white.rounded-2xl,
        .bg-white.rounded-xl.shadow-md,
        .bg-white.rounded-2xl.shadow-md {
            background-color: var(--card) !important;
            border: 1px solid var(--border) !important;
            border-radius: 16px !important;
            box-shadow: var(--shadow-card) !important;
            position: relative;
            overflow: hidden;
            transition: box-shadow 0.22s ease, transform 0.22s ease, border-color 0.22s ease !important;
        }
        /* Post top accent stripe */
        .bg-white.rounded-xl::before,
        .bg-white.rounded-2xl::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 2px;
            background: linear-gradient(90deg, var(--accent) 0%, var(--accent-blue) 50%, var(--accent-2) 100%);
            opacity: 0;
            transition: opacity 0.22s ease;
        }
        .bg-white.rounded-xl:hover::before,
        .bg-white.rounded-2xl:hover::before { opacity: 1; }
        .bg-white.rounded-xl:hover,
        .bg-white.rounded-2xl:hover {
            border-color: var(--border-mid) !important;
            box-shadow: 0 8px 32px rgba(0,0,0,0.50), 0 2px 8px rgba(0,0,0,0.30) !important;
            transform: translateY(-2px);
        }

        /* ================================================
           SHADOW OVERRIDES
           ================================================ */
        .shadow-md  { box-shadow: var(--shadow-card) !important; }
        .shadow-sm  { box-shadow: 0 1px 6px rgba(0,0,0,0.35) !important; }
        .shadow-2xl { box-shadow: var(--shadow-modal) !important; }

        /* ================================================
           TABLE — editorial post-feed style
           ================================================ */
        table { font-family: 'Outfit', sans-serif !important; }
        thead th {
            font-family: 'Syne', sans-serif !important;
            font-weight: 700 !important;
            font-size: 0.7rem !important;
            letter-spacing: 0.08em !important;
            text-transform: uppercase !important;
        }
        thead.bg-gradient-to-r {
            background: linear-gradient(135deg, #1e1740 0%, #1a1535 100%) !important;
        }
        thead.bg-gradient-to-r th { color: var(--txt-secondary) !important; }
        tbody tr {
            transition: background-color 0.14s ease !important;
            border-bottom: 1px solid var(--border) !important;
        }
        tbody tr:hover { background-color: rgba(108,99,255,0.06) !important; }
        /* CORRECCIÓN BUG 3: el selector sin :hover aplicaba el fondo SIEMPRE.
           Las filas de inventario sin datos mostraban tinte morado permanente. */
        .hover\:bg-purple-50:hover { background-color: rgba(108,99,255,0.10) !important; }
        .bg-purple-50              { background-color: rgba(108,99,255,0.10) !important; }
        .hover\:bg-purple-100:hover { background-color: rgba(108,99,255,0.15) !important; }
        .hover\:bg-gray-50:hover { background-color: rgba(255,255,255,0.04) !important; }

        @media (max-width: 640px) {
            table { font-size: 12px !important; }
            th, td { padding: 0.45rem !important; }
        }

        /* ================================================
           BUTTONS — post-feed interaction style
           ================================================ */
        button {
            font-family: 'Outfit', sans-serif !important;
            font-weight: 600 !important;
            letter-spacing: 0.01em !important;
            min-height: 44px;
            position: relative;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.14s var(--ease-spring), box-shadow 0.16s ease !important;
        }
        button::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(255,255,255,0.12), transparent 60%);
            border-radius: inherit;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s ease;
        }
        button:hover::before { opacity: 1; }
        button:active {
            transform: scale(0.955) !important;
            box-shadow: none !important;
        }
        button:focus-visible {
            outline: 2px solid rgba(108,99,255,0.7);
            outline-offset: 2px;
        }
        /* Gradient buttons glow lift */
        button[class*="bg-gradient"]:hover {
            transform: translateY(-2px) scale(1.01) !important;
            box-shadow: 0 10px 28px rgba(108,99,255,0.38) !important;
        }
        button[class*="bg-gradient"]:active {
            transform: translateY(0) scale(0.97) !important;
        }
        /* Override gradient colours for post-feed palette */
        button[class*="from-purple"][class*="to-orange"] {
            background: linear-gradient(135deg, var(--accent) 0%, var(--accent-2) 100%) !important;
        }
        button[class*="from-purple"][class*="to-blue"],
        button[class*="from-blue"][class*="to-purple"] {
            background: linear-gradient(135deg, var(--accent) 0%, var(--accent-blue) 100%) !important;
        }
        button[class*="from-green"][class*="to-emerald"] {
            background: linear-gradient(135deg, var(--accent-green) 0%, #059669 100%) !important;
        }
        button[class*="from-red"][class*="to-orange"] {
            background: linear-gradient(135deg, var(--accent-2) 0%, #e65100 100%) !important;
        }
        /* Outline / border buttons */
        button[class*="border-gray-200"] {
            background: transparent !important;
            border-color: var(--border-mid) !important;
            color: var(--txt-primary) !important;
        }
        button[class*="border-gray-200"]:hover {
            background: rgba(255,255,255,0.06) !important;
            border-color: rgba(108,99,255,0.45) !important;
        }
        button[class*="border-purple-500"] {
            border-color: var(--accent) !important;
            color: var(--accent) !important;
        }
        button[class*="border-purple-500"]:hover {
            background: rgba(108,99,255,0.10) !important;
        }
        button[class*="border-green"] {
            border-color: var(--accent-green) !important;
            color: var(--accent-green) !important;
        }
        button[class*="border-green"]:hover {
            background: rgba(6,214,160,0.10) !important;
        }

        /* ================================================
           INPUTS / SELECTS / TEXTAREAS
           ================================================ */
        input, select, textarea {
            font-family: 'Outfit', sans-serif !important;
            font-size: 15px !important;
            min-height: 44px !important;
            background-color: var(--surface) !important;
            color: var(--txt-primary) !important;
            border-color: var(--border-mid) !important;
            transition: border-color 0.18s ease, box-shadow 0.18s ease !important;
        }
        input:focus, select:focus, textarea:focus {
            outline: none !important;
            border-color: var(--accent) !important;
            box-shadow: 0 0 0 3px rgba(108,99,255,0.18), 0 1px 4px rgba(0,0,0,0.30) !important;
        }
        input[type="number"] {
            font-family: 'JetBrains Mono', monospace !important;
            font-size: 14px !important;
        }
        input:disabled {
            background-color: #0f1015 !important;
            color: var(--txt-muted) !important;
        }
        input::placeholder,
        textarea::placeholder { color: var(--txt-muted) !important; }

        /* ================================================
           SELECT dropdown arrow colour
           ================================================ */
        select {
            appearance: auto;
            color-scheme: dark;
        }

        /* ================================================
           LABELS
           ================================================ */
        label.block { color: var(--txt-secondary) !important; }

        /* ================================================
           SPECIFIC COLOUR UTILITY OVERRIDES
           ================================================ */
        .text-purple-600 { color: var(--accent) !important; }
        .text-purple-700 { color: var(--accent) !important; }
        .text-orange-500 { color: var(--accent-3) !important; }
        .text-orange-600 { color: var(--accent-2) !important; }
        .text-green-700  { color: var(--accent-green) !important; }
        .text-gray-300   { color: var(--txt-muted) !important; }
        .bg-purple-100   { background-color: rgba(108,99,255,0.18) !important; }
        .bg-purple-50    { background-color: rgba(108,99,255,0.10) !important; }
        .bg-orange-50    { background-color: rgba(255,209,102,0.10) !important; }
        .bg-purple-600   { background-color: var(--accent) !important; }
        .text-purple-700.bg-purple-100 { color: #a89cff !important; }
        .bg-gray-50.rounded-xl,
        .bg-gray-50.rounded-2xl {
            background-color: var(--surface) !important;
            border: 1px solid var(--border) !important;
            border-radius: 12px !important;
        }
        /* Table container inside orders/modal */
        .bg-gray-50.rounded-xl.overflow-hidden {
            background-color: var(--surface) !important;
        }

        /* CORRECCIÓN BUG 4: .text-orange-500 duplicado eliminado — ya declarado arriba */

        /* ================================================
           AREA SELECTOR BUTTONS (Almacén / Barra)
           ================================================ */
        /* CORRECCIÓN BUG 5: selector redundante con espacio literal en atributo class
           eliminado — era impreciso. Se usa el selector doble de atributos separados. */
        button[class*="from-purple-500"][class*="to-blue-500"] {
            background: linear-gradient(135deg, var(--accent), var(--accent-blue)) !important;
        }
        button[class*="border-gray-300"] {
            border-color: var(--border-mid) !important;
            color: var(--txt-secondary) !important;
            background: transparent !important;
        }
        button[class*="border-gray-300"]:hover {
            border-color: var(--accent) !important;
            color: var(--txt-primary) !important;
        }

        /* ================================================
           MODALS — dark glass sheet
           ================================================ */
        #productModal,
        #orderModal,
        #inventarioModal {
            animation: backdropReveal 0.25s ease-out both !important;
            backdrop-filter: blur(12px) saturate(1.6) !important;
            -webkit-backdrop-filter: blur(12px) saturate(1.6) !important;
            background-color: rgba(0,0,0,0.65) !important;
        }
        #productModal > div,
        #orderModal > div,
        #inventarioModal > div {
            animation: springUp 0.46s var(--ease-spring) both !important;
            background-color: var(--card) !important;
            border: 1px solid var(--border-mid) !important;
            border-radius: 24px 24px 0 0 !important;
            box-shadow: var(--shadow-modal) !important;
        }
        @media (min-width: 768px) {
            #productModal > div,
            #orderModal > div,
            #inventarioModal > div {
                border-radius: 24px !important;
            }
        }
        /* Modal drag handle */
        #productModal .w-12.h-1\.5,
        #orderModal .w-12.h-1\.5,
        #inventarioModal .w-12.h-1\.5 {
            background: linear-gradient(90deg, var(--accent), var(--accent-2)) !important;
            opacity: 0.5 !important;
        }
        /* Modal header text */
        #productModal h2,
        #orderModal h2,
        #inventarioModal h2 {
            font-family: 'Syne', sans-serif !important;
            font-weight: 700 !important;
            letter-spacing: -0.025em !important;
            color: var(--txt-primary) !important;
        }

        /* ================================================
           TOAST — post notification chip
           ================================================ */
        #toast {
            animation: toastPop 0.44s var(--ease-spring) both !important;
        }
        #toast > div {
            background: linear-gradient(135deg, #2a1f5e 0%, #1a1535 100%) !important;
            border: 1px solid rgba(108,99,255,0.45) !important;
            box-shadow: 0 12px 36px rgba(0,0,0,0.55), var(--glow-accent) !important;
            font-family: 'Outfit', sans-serif !important;
            font-weight: 600 !important;
            font-size: 0.875rem !important;
            padding: 12px 24px !important;
            color: var(--txt-primary) !important;
        }
        #toast .w-2.h-2.rounded-full {
            background: var(--accent) !important;
            box-shadow: 0 0 8px var(--accent) !important;
        }

        /* ================================================
           POST CARD headings
           ================================================ */
        h3.text-xl.font-bold,
        h3.text-lg.font-bold,
        .text-xl.font-bold,
        .text-2xl.font-bold,
        .text-lg.font-semibold {
            font-family: 'Syne', sans-serif !important;
            letter-spacing: -0.02em !important;
            color: var(--txt-primary) !important;
        }

        /* ================================================
           STAT / BADGE CHIPS
           ================================================ */
        span.text-sm.font-medium.text-purple-600.bg-purple-50 {
            background: rgba(108,99,255,0.15) !important;
            color: #a89cff !important;
            border: 1px solid rgba(108,99,255,0.25) !important;
            border-radius: 8px !important;
        }
        span.text-xs.px-2.py-1.bg-purple-100 {
            background: rgba(108,99,255,0.18) !important;
            color: #a89cff !important;
            border-radius: 6px !important;
        }

        /* ================================================
           SVG ICONS — inherit colour adjustments
           ================================================ */
        .text-gray-400 svg,
        svg.text-gray-400 { color: var(--txt-muted) !important; }

        /* ================================================
           OVERFLOW / BORDER helpers
           ================================================ */
        .border-t.border-gray-200 { border-color: var(--border) !important; }
        .border-b.border-gray-200 { border-color: var(--border) !important; }
        .border-2.border-orange-200 { border-color: rgba(255,209,102,0.35) !important; }
        .border-2.border-purple-300 { border-color: rgba(108,99,255,0.45) !important; }

        /* ================================================
           NETWORK STATUS BAR
           ================================================ */
        #networkStatus {
            font-family: 'Outfit', sans-serif !important;
            font-weight: 600 !important;
            background: linear-gradient(90deg, #b45309, #92400e) !important;
            border-top: 1px solid rgba(255,255,255,0.1) !important;
        }

        /* ================================================
           RESPONSIVE
           ================================================ */
        @media (max-width: 768px) {
            .px-6 { padding-left: 0.75rem !important; padding-right: 0.75rem !important; }
            body  { font-size: 14px; }
            button { font-size: 14px; }
            input, select, textarea { font-size: 16px !important; }
        }
        @media (min-width: 640px) {
            .px-6 { padding-left: 1.5rem !important; padding-right: 1.5rem !important; }
        }

        /* ================================================
           SELECTION
           ================================================ */
        ::selection {
            background: rgba(108,99,255,0.30);
            color: #fff;
        }
    </style>
</head>
<body class="min-h-screen transition-colors duration-300">
    <input type="file" id="fileInput" accept=".xlsx,.xls,.csv" class="hidden">

    <div class="sticky top-0 z-50 bg-gradient-to-r from-purple-600 via-blue-600 to-orange-500 shadow-lg animate-fadeIn">
        <div class="max-w-7xl mx-auto px-3 sm:px-4 md:px-6 py-3 sm:py-5">
            <div class="flex justify-between items-center gap-2">
                <div>
                    <h1 class="text-lg sm:text-xl md:text-2xl font-bold text-white">Control de Inventario</h1>

    <script>
        let products = [];
        let cart = [];
        let orders = [];
        let inventories = [];
        let activeTab = 'inicio';
        let editingProductId = null;
        let searchTerm = '';
        let selectedGroup = 'Todos';
        let selectedArea = 'almacen';
        let expandedInventories = new Set();
        let inventarioConteo = {}; // Estructura: { productId: { area: { enteras: 0, abiertas: [] } } }
        let inventarioModalProductId = null;

        const areas = {
            almacen: 'Almacén',
            barra1: 'Barra 1',
            barra2: 'Barra 2'
        };

        // ==================== PERSISTENCIA DE DATOS ====================
        function saveToLocalStorage() {
            try {
                localStorage.setItem('inventarioApp_products', JSON.stringify(products));
                localStorage.setItem('inventarioApp_orders', JSON.stringify(orders));
                localStorage.setItem('inventarioApp_inventories', JSON.stringify(inventories));
                localStorage.setItem('inventarioApp_cart', JSON.stringify(cart));
                localStorage.setItem('inventarioApp_activeTab', activeTab);
                localStorage.setItem('inventarioApp_selectedGroup', selectedGroup);
                localStorage.setItem('inventarioApp_selectedArea', selectedArea);
                localStorage.setItem('inventarioApp_searchTerm', searchTerm);
                localStorage.setItem('inventarioApp_expandedInventories', JSON.stringify(Array.from(expandedInventories)));
                localStorage.setItem('inventarioApp_inventarioConteo', JSON.stringify(inventarioConteo));
            } catch (e) {
                console.error('Error al guardar en localStorage:', e);
                showNotification('⚠️ Almacenamiento lleno. Elimina historiales o productos para liberar espacio.');
            }
        }

        function loadFromLocalStorage() {
            const safeGet = (key, fallback) => {
                try {
                    const raw = localStorage.getItem(key);
                    return raw ? JSON.parse(raw) : fallback;
                } catch (e) {
                    console.warn('Dato corrupto en localStorage para "' + key + '", usando valor por defecto.', e);
                    return fallback;
                }
            };

            products   = safeGet('inventarioApp_products',   []);
            orders     = safeGet('inventarioApp_orders',     []);
            inventories = safeGet('inventarioApp_inventories', []);
            cart       = safeGet('inventarioApp_cart',       []);

            const storedTab   = localStorage.getItem('inventarioApp_activeTab');
            const storedGroup = localStorage.getItem('inventarioApp_selectedGroup');
            const storedArea  = localStorage.getItem('inventarioApp_selectedArea');
            const storedSearch = localStorage.getItem('inventarioApp_searchTerm');

            if (storedTab)    activeTab     = storedTab;
            if (storedGroup)  selectedGroup = storedGroup;
            if (storedArea)   selectedArea  = storedArea;
            if (storedSearch) searchTerm    = storedSearch;

            const storedExpanded = safeGet('inventarioApp_expandedInventories', []);
            expandedInventories = new Set(storedExpanded);

            const parsedConteo = safeGet('inventarioApp_inventarioConteo', {});
            // Migrar formato antiguo plano {prodId:{enteras,abiertas}} → {prodId:{area:{enteras,abiertas}}}
            const migrated = {};
            Object.keys(parsedConteo).forEach(prodId => {
                const val = parsedConteo[prodId];
                if (val && typeof val.enteras !== 'undefined' && !val.almacen && !val.barra1 && !val.barra2) {
                    migrated[prodId] = { almacen: val };
                } else {
                    migrated[prodId] = val;
                }
            });
            inventarioConteo = migrated;
        }

        function initializeApp() {
            loadFromLocalStorage();

            window.addEventListener('beforeunload', () => saveToLocalStorage());
            setInterval(() => saveToLocalStorage(), 30000);

            function updateNetworkStatus() {
                const existing = document.getElementById('networkStatus');
                if (existing) existing.remove();
                if (!navigator.onLine) {
                    const bar = document.createElement('div');
                    bar.id = 'networkStatus';
                    bar.style.cssText = 'position:fixed;bottom:0;left:0;right:0;background:#f59e0b;color:#fff;text-align:center;padding:6px;font-size:13px;font-weight:600;z-index:9999;';
                    bar.textContent = '⚠️ Sin conexión — los datos están guardados localmente';
                    document.body.appendChild(bar);
                }
            }
            window.addEventListener('online',  updateNetworkStatus);
            window.addEventListener('offline', updateNetworkStatus);
            updateNetworkStatus();
            
            if (products.length === 0) {
                const initialProducts = [
                    { id: 'PRD-001', name: 'Vodka Premium', stockByArea: { almacen: 12, barra1: 5, barra2: 3 }, minStock: 6, unit: 'Botellas', group: 'Premium' },
                    { id: 'PRD-002', name: 'Ron Añejo', stockByArea: { almacen: 8, barra1: 4, barra2: 2 }, minStock: 5, unit: 'Botellas', group: 'Premium' },
                    { id: 'PRD-003', name: 'Whisky Escocés', stockByArea: { almacen: 4, barra1: 2, barra2: 1 }, minStock: 4, unit: 'Botellas', group: 'Premium' },
                    { id: 'PRD-004', name: 'Gin London Dry', stockByArea: { almacen: 10, barra1: 3, barra2: 2 }, minStock: 6, unit: 'Botellas', group: 'Premium' },
                    { id: 'PRD-005', name: 'Tequila Reposado', stockByArea: { almacen: 3, barra1: 2, barra2: 1 }, minStock: 5, unit: 'Botellas', group: 'Premium' },
                    { id: 'PRD-006', name: 'Cerveza Nacional', stockByArea: { almacen: 48, barra1: 24, barra2: 18 }, minStock: 24, unit: 'Unidades', group: 'Bebidas' },
                    { id: 'PRD-007', name: 'Cerveza Importada', stockByArea: { almacen: 18, barra1: 12, barra2: 6 }, minStock: 12, unit: 'Unidades', group: 'Bebidas' },
                    { id: 'PRD-008', name: 'Vino Tinto Reserva', stockByArea: { almacen: 15, barra1: 6, barra2: 4 }, minStock: 8, unit: 'Botellas', group: 'Vinos' },
                    { id: 'PRD-009', name: 'Vino Blanco', stockByArea: { almacen: 12, barra1: 5, barra2: 3 }, minStock: 6, unit: 'Botellas', group: 'Vinos' },
                    { id: 'PRD-010', name: 'Coca Cola', stockByArea: { almacen: 36, barra1: 20, barra2: 15 }, minStock: 24, unit: 'Unidades', group: 'Bebidas' },
                    { id: 'PRD-011', name: 'Agua Mineral', stockByArea: { almacen: 42, barra1: 25, barra2: 18 }, minStock: 30, unit: 'Unidades', group: 'Bebidas' },
                    { id: 'PRD-012', name: 'Jugo de Naranja', stockByArea: { almacen: 8, barra1: 4, barra2: 3 }, minStock: 6, unit: 'Litros', group: 'Bebidas' },
                    { id: 'PRD-013', name: 'Limones', stockByArea: { almacen: 5, barra1: 2, barra2: 1.5 }, minStock: 3, unit: 'Kilos', group: 'Frutas' },
                    { id: 'PRD-014', name: 'Hielo', stockByArea: { almacen: 20, barra1: 10, barra2: 8 }, minStock: 15, unit: 'Kilos', group: 'Insumos' }
                ];
                products = initialProducts;
                saveToLocalStorage();
            }
            
            switchTab(activeTab);
        }

        // ==================== FUNCIONES UTILITARIAS ====================
        function getTotalStock(product) {
            return product.stockByArea.almacen + product.stockByArea.barra1 + product.stockByArea.barra2;
        }

        function getAvailableGroups() {
            const groups = new Set(products.map(p => p.group).filter(g => g));
            return ['Todos', ...Array.from(groups).sort()];
        }

        function switchTab(tab) {
            activeTab = tab;
            document.querySelectorAll('.tab-btn').forEach(btn => {
                const indicator = btn.querySelector('.tab-indicator');
                if (btn.dataset.tab === tab) {
                    btn.classList.remove('text-gray-600');
                    btn.classList.add('text-gray-900');
                    if (!indicator) {
                        const div = document.createElement('div');
                        div.className = 'tab-indicator absolute bottom-0 left-0 right-0 h-1 bg-gradient-to-r from-purple-500 to-orange-500 rounded-t-full animate-slideIn';
                        btn.appendChild(div);
                    }
                } else {
                    btn.classList.remove('text-gray-900');
                    btn.classList.add('text-gray-600');
                    if (indicator) {
                        indicator.remove();
                    }
                }
            });
            saveToLocalStorage();
            renderTab();
        }

        function switchArea(area) {
            // CORRECCIÓN BUG 6: selectedArea debe actualizarse ANTES de guardar.
            // Antes se guardaba el área anterior por error de orden.
            selectedArea = area;
            saveToLocalStorage();
            renderTab();
        }

        function showNotification(message) {
            const toast = document.getElementById('toast');
            const toastMessage = document.getElementById('toastMessage');
            toastMessage.textContent = message;
            toast.classList.remove('hidden');
            toast.style.animation = 'none';
            // Force reflow then re-apply animation
            void toast.offsetWidth;
            toast.style.animation = '';
            clearTimeout(toast._hideTimer);
            toast._hideTimer = setTimeout(() => {
                toast.classList.add('hidden');
            }, 3000);
        }

        function updateSearchTerm(value) {
            searchTerm = value;
            saveToLocalStorage();
            renderTab();
        }

        function updateSelectedGroup(value) {
            selectedGroup = value;
            saveToLocalStorage();
            renderTab();
        }

        function renderTab() {
            updateHeaderActions();
            const content = document.getElementById('tabContent');
            
            // Replay entrance animation on every tab switch
            content.style.animation = 'none';
            void content.offsetWidth;
            content.style.animation = '';

            switch(activeTab) {
                case 'inicio':
                    content.innerHTML = renderInicioTab();
                    break;
                case 'productos':
                    content.innerHTML = renderProductosTab();
                    break;
                case 'pedidos':
                    content.innerHTML = renderPedidosTab();
                    break;
                case 'inventario':
                    content.innerHTML = renderInventarioTab();
                    break;
                case 'historia':
                    content.innerHTML = renderHistoriaTab();
                    break;
            }
        }

        function updateHeaderActions() {
            const headerActions = document.getElementById('headerActions');
            
            if (activeTab === 'inicio') {

        function resetAllInventario() {
            if (!confirm('⚠️ ¿Estás seguro de que quieres borrar TODAS las cantidades de Almacén, Barra 1 y Barra 2?\n\nEsta acción no se puede deshacer.')) return;
            products.forEach(p => {
                p.stockByArea.almacen = 0;
                p.stockByArea.barra1 = 0;
                p.stockByArea.barra2 = 0;
            });
            inventarioConteo = {};
            saveToLocalStorage();
            showNotification('Todas las cantidades han sido borradas');
            renderTab();
        }

        function openInventarioModal(productId) {
            const product = products.find(p => p.id === productId);
            if (!product) return;
            inventarioModalProductId = productId;

            if (!inventarioConteo[productId]) inventarioConteo[productId] = {};
            const areaData = inventarioConteo[productId][selectedArea] || { enteras: 0, abiertas: [] };

            document.getElementById('inventarioModalTitle').textContent = product.name;
            document.getElementById('inventarioModalSubtitle').textContent = product.group + ' · ' + product.unit + ' — ' + areas[selectedArea];
            document.getElementById('inv_enteras').value = areaData.enteras || 0;

            const container = document.getElementById('inv_abiertasContainer');
            container.innerHTML = '';
            const abiertas = (areaData.abiertas && areaData.abiertas.length > 0) ? areaData.abiertas : [0];
            abiertas.forEach((val, idx) => renderAbiertaInput(val, idx));

            document.getElementById('inventarioModal').classList.remove('hidden');
        }

        function renderAbiertaInput(val, idx) {
            const container = document.getElementById('inv_abiertasContainer');
            const div = document.createElement('div');
            div.className = 'flex items-center gap-2';
            div.id = 'abierta_row_' + idx;
            div.innerHTML = '<span class="text-xs font-medium text-gray-500 w-16 flex-shrink-0">Abierta ' + (idx + 1) + '</span>' +
                '<input type="number" id="inv_abierta_' + idx + '" min="0" step="0.01" value="' + val + '" ' +
                'class="flex-1 px-3 py-2 bg-white text-gray-900 border-2 border-orange-200 rounded-xl focus:ring-2 focus:ring-orange-400 focus:border-transparent text-center font-bold" ' +
                'placeholder="0.0">' +
                (idx > 0 ? '<button onclick="removeAbiertaInModal(' + idx + ')" class="p-2 text-red-400 hover:text-red-600 hover:bg-red-50 rounded-lg transition-all"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg></button>' : '<div class="w-8"></div>');
            container.appendChild(div);
        }

        function addAbiertaInModal() {
            const container = document.getElementById('inv_abiertasContainer');
            const idx = container.children.length;
            renderAbiertaInput(0, idx);
        }

        function removeAbiertaInModal(idx) {
            const container = document.getElementById('inv_abiertasContainer');
            const vals = [];
            for (let i = 0; i < container.children.length; i++) {
                const input = document.getElementById('inv_abierta_' + i);
                if (input && i !== idx) vals.push(parseFloat(input.value) || 0);
            }
            container.innerHTML = '';
            vals.forEach((v, i) => renderAbiertaInput(v, i));
        }

        function closeInventarioModal() {
            document.getElementById('inventarioModal').classList.add('hidden');
            inventarioModalProductId = null;
        }

        function saveInventarioModal() {
            if (!inventarioModalProductId) return;
            const enteras = parseFloat(document.getElementById('inv_enteras').value) || 0;
            const container = document.getElementById('inv_abiertasContainer');
            const abiertas = [];
            for (let i = 0; i < container.children.length; i++) {
                const input = document.getElementById('inv_abierta_' + i);
                if (input) abiertas.push(parseFloat(input.value) || 0);
            }
            if (!inventarioConteo[inventarioModalProductId]) inventarioConteo[inventarioModalProductId] = {};
            inventarioConteo[inventarioModalProductId][selectedArea] = { enteras, abiertas };
            const product = products.find(p => p.id === inventarioModalProductId);
            if (product) product.stockByArea[selectedArea] = enteras;
            saveToLocalStorage();
            showNotification('Conteo guardado en ' + areas[selectedArea]);
            closeInventarioModal();
            renderTab();
        }

        function toggleInventory(invId) {
            if (expandedInventories.has(invId)) {
                expandedInventories.delete(invId);

            }
            saveToLocalStorage();
            renderTab();

        function downloadInventory(invId) {
            const inv = inventories.find(i => i.id === invId);
            if (!inv) return;

            const headers = ['Producto', 'Stock', 'Unidad', 'Grupo'];
            const rows = inv.products.map(p => [
                p.name,
                p.stock,
                p.unit,
                p.group
            ]);
            
            const csv = [headers].concat(rows).map(row => row.join(',')).join('\n');
            const blob = new Blob([csv], { type: 'text/csv' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            const safeDate = inv.date.replace(/[/:,\s]/g, '-').replace(/-+/g, '-').replace(/-$/, '');
            a.download = inv.id + '_' + safeDate + '.csv';
            a.click();
            setTimeout(() => window.URL.revokeObjectURL(url), 1000);
            showNotification('Inventario descargado');
        }

        function generateProductId() {
            let maxNum = 0;

                const match = p.id.match(/^PRD-(\d+)$/);

            document.getElementById('productUnit').value = 'Botellas';
            document.getElementById('productGroup').value = '';
            document.getElementById('productStock').value = '0';
            document.getElementById('productMinStock').value = '0';
            
            if (productId) {

                if (product) {
                    editingProductId = product.id;
                    title.textContent = 'Editar Producto';

                    document.getElementById('productUnit').value = product.unit || 'Botellas';

                } else {

            } else {

        function saveProduct() {
            const name = document.getElementById('productName').value.trim();
            if (!name) {
                showNotification('La descripción es requerida');
                return;
            }

            let productId = document.getElementById('productId').value.trim();
            
            if (!productId) {
                productId = generateProductId();
            }

            const idExists = products.some(p => p.id === productId && p.id !== editingProductId);
            if (idExists) {
                showNotification('El ID ya existe');
                return;
            }

            const unit = document.getElementById('productUnit').value;
            const group = document.getElementById('productGroup').value.trim() || 'General';
            const totalStock = parseFloat(document.getElementById('productStock').value) || 0;
            const minStock = parseFloat(document.getElementById('productMinStock').value) || 0;

            if (editingProductId) {
                const product = products.find(p => p.id === editingProductId);
                if (product) {
                    const currentTotal = getTotalStock(product);
                    
                    if (editingProductId !== productId) {
                        if (inventarioConteo[editingProductId]) {
                            inventarioConteo[productId] = inventarioConteo[editingProductId];
                            delete inventarioConteo[editingProductId];
                        }
                    }

                    product.id = productId;
                    product.name = name;
                    product.unit = unit;
                    product.group = group;
                    product.minStock = minStock;
                    
                    if (currentTotal === 0) {
                        product.stockByArea.almacen = totalStock;
                        product.stockByArea.barra1 = 0;
                        product.stockByArea.barra2 = 0;
                    } else {
                        const ratio = totalStock / currentTotal;
                        product.stockByArea.almacen = product.stockByArea.almacen * ratio;
                        product.stockByArea.barra1 = product.stockByArea.barra1 * ratio;
                        product.stockByArea.barra2 = product.stockByArea.barra2 * ratio;
                    }
                }
                showNotification('Producto actualizado');
            } else {
                const newProduct = {
                    id: productId,
                    name: name,
                    unit: unit,
                    group: group,
                    minStock: minStock,
                    stockByArea: {
                        almacen: totalStock,
                        barra1: 0,
                        barra2: 0
                    }
                };
                products.push(newProduct);
                showNotification('Producto agregado');
            }

            saveToLocalStorage();
            closeProductModal();
            renderTab();
        }

        function saveInventorySnapshot() {
            let maxInvNum = 0;
            inventories.forEach(inv => {

                    group: p.group

            };

            showNotification('Inventario de ' + areas[selectedArea] + ' guardado');

        function handleFileImport(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const data = new Uint8Array(e.target.result);
                    const workbook = XLSX.read(data, { type: 'array' });
                    const firstSheet = workbook.Sheets[workbook.SheetNames[0]];
                    const jsonData = XLSX.utils.sheet_to_json(firstSheet);

                    if (!jsonData || jsonData.length === 0) {
                        showNotification('El archivo no contiene datos válidos');
                        return;
                    }

                    // Conjunto de IDs existentes
                    const existingIds = new Set(products.map(p => p.id));
                    // Encontrar el máximo número de ID para generar nuevos
                    let maxNum = 0;
                    products.forEach(p => {
                        const match = p.id.match(/^PRD-(\d+)$/);
                        if (match) maxNum = Math.max(maxNum, parseInt(match[1], 10));
                    });
                    let nextNum = maxNum + 1;

                    const toImport = [];
                    const usedInBatch = new Set(); // IDs asignados durante esta importación

                    jsonData.forEach((row) => {
                        const rawId = String(row['ID'] || row['id'] || '').trim();
                        let id = rawId;

                        if (!id) {
                            // Sin ID: generar uno nuevo único
                            do {
                                id = 'PRD-' + String(nextNum++).padStart(3, '0');
                            } while (existingIds.has(id) || usedInBatch.has(id));
                        } else {
                            // Con ID: verificar si ya existe (en productos o en el lote)
                            if (existingIds.has(id) || usedInBatch.has(id)) {
                                // Conflicto: generar nuevo ID
                                do {
                                    id = 'PRD-' + String(nextNum++).padStart(3, '0');
                                } while (existingIds.has(id) || usedInBatch.has(id));
                            }
                        }

                        usedInBatch.add(id);

                        const product = {
                            id: id,
                            name: String(row['Descripción'] || row['descripcion'] || row['Producto'] || row['producto'] || 'Sin nombre'),
                            stockByArea: {
                                almacen: parseFloat(row['Cantidad'] || row['cantidad'] || row['Stock'] || row['stock'] || 0) || 0,
                                barra1: 0,
                                barra2: 0
                            },
                            unit: String(row['Unidad'] || row['unidad'] || row['Medida'] || row['medida'] || 'Unidades'),
                            group: String(row['Grupo'] || row['grupo'] || 'General'),
                            minStock: 0
                        };
                        toImport.push(product);
                    });

                    products = products.concat(toImport);
                    saveToLocalStorage();
                    showNotification(toImport.length + ' productos importados.');

                    // Reiniciar filtros y volver a la pestaña de inicio
                    activeTab = 'inicio';
                    selectedGroup = 'Todos';
                    searchTerm = '';
                    selectedArea = 'almacen';
                    saveToLocalStorage();

                    renderTab();
                    event.target.value = '';
                } catch (error) {
                    showNotification('Error al importar archivo: ' + error.message);
                    console.error(error);
                }
            };
            reader.readAsArrayBuffer(file);
        }

        function exportToExcel() {
            const areaKeys  = ['almacen', 'barra1', 'barra2'];
            const areaNames = { almacen: 'Almacén', barra1: 'Barra 1', barra2: 'Barra 2' };
            const areaColor = { almacen: '7C3AED', barra1: '2563EB', barra2: 'EA580C' };

            const maxAbiertas = { almacen: 1, barra1: 1, barra2: 1 };
            products.forEach(p => {
                areaKeys.forEach(area => {
                    const d = inventarioConteo[p.id] && inventarioConteo[p.id][area];
                    if (d && d.abiertas && d.abiertas.length > maxAbiertas[area]) {
                        maxAbiertas[area] = d.abiertas.length;
                    }
                });
            });

            const FIXED_COLS = 4;
            const headerRow = ['ID', 'Producto', 'Unidad', 'Grupo'];
            const colMeta = [null, null, null, null];

            areaKeys.forEach(area => {
                colMeta.push({ area, tipo: 'entera' });
                headerRow.push(areaNames[area] + ' – Bot. Entera');
                for (let i = 1; i <= maxAbiertas[area]; i++) {
                    colMeta.push({ area, tipo: 'abierta' });
                    headerRow.push(areaNames[area] + ' – Bot. Abierta ' + i);
                }
            });
            colMeta.push('total');
            headerRow.push('TOTAL');

            const totalCols = headerRow.length;
            const TOTAL_COL = totalCols - 1;

            function getNumericValues(p) {
                const nums = [];
                areaKeys.forEach(area => {
                    const d = (inventarioConteo[p.id] && inventarioConteo[p.id][area]) || { enteras: 0, abiertas: [] };
                    nums.push(d.enteras !== undefined ? (d.enteras || 0) : 0);
                    for (let i = 0; i < maxAbiertas[area]; i++) {
                        nums.push((d.abiertas && d.abiertas[i] !== undefined) ? d.abiertas[i] : 0);
                    }
                });
                return nums;
            }

            const sorted = [...products].sort((a, b) => (a.group || '').localeCompare(b.group || ''));
            const groups = [...new Set(sorted.map(p => p.group || 'General'))];

            const wsRows = [];
            const grandTotNums = Array(totalCols - FIXED_COLS - 1).fill(0);
            let grandTotTotal = 0;

            groups.forEach(group => {
                const groupProducts = sorted.filter(p => (p.group || 'General') === group);
                const groupNums = Array(totalCols - FIXED_COLS - 1).fill(0);
                let groupTotal = 0;
                let evenCount = 0;

                groupProducts.forEach(p => {
                    const nums = getNumericValues(p);
                    const rowTotal = nums.reduce((s, v) => s + v, 0);
                    wsRows.push({
                        type: 'data',
                        even: evenCount % 2 === 0,
                        data: [p.id, p.name, p.unit, p.group || 'General', ...nums, rowTotal]
                    });
                    nums.forEach((v, i) => { groupNums[i] += v; });
                    groupTotal += rowTotal;
                    grandTotNums.forEach((_, i) => { grandTotNums[i] += nums[i] || 0; });
                    grandTotTotal += rowTotal;
                    evenCount++;
                });

                wsRows.push({
                    type: 'subtotal',
                    data: ['', 'Subtotal – ' + group, '', '', ...groupNums, groupTotal]
                });
            });

            wsRows.push({
                type: 'grandtotal',
                data: ['', 'GRAN TOTAL', '', '', ...grandTotNums, grandTotTotal]
            });

            const wb = XLSX.utils.book_new();
            const allRows = [headerRow, ...wsRows.map(r => r.data)];
            const ws = XLSX.utils.aoa_to_sheet(allRows);

            ws['!cols'] = colMeta.map((m, i) => {
                if (i === 0) return { wch: 10 };
                if (i === 1) return { wch: 32 };
                if (i === 2) return { wch: 12 };
                if (i === 3) return { wch: 16 };
                if (i === TOTAL_COL) return { wch: 14 };
                return { wch: 22 };
            });

            const fixedHdrStyle = {
                font: { bold: true, color: { rgb: 'FFFFFF' }, sz: 11 },
                fill: { fgColor: { rgb: '374151' } },
                alignment: { horizontal: 'center', vertical: 'center', wrapText: true },
                border: { bottom: { style: 'medium', color: { rgb: 'FFFFFF' } } }
            };
            const grupoHdrStyle = { ...fixedHdrStyle, fill: { fgColor: { rgb: '6B7280' } } };
            const totalHdrStyle = { ...fixedHdrStyle, fill: { fgColor: { rgb: '065F46' } } };

            for (let ci = 0; ci < totalCols; ci++) {
                const ref = XLSX.utils.encode_cell({ r: 0, c: ci });
                if (!ws[ref]) continue;
                if (ci === 3) { ws[ref].s = grupoHdrStyle; continue; }
                if (ci === TOTAL_COL) { ws[ref].s = totalHdrStyle; continue; }
                if (ci < FIXED_COLS) { ws[ref].s = fixedHdrStyle; continue; }
                const meta = colMeta[ci];
                ws[ref].s = {
                    font: { bold: true, color: { rgb: 'FFFFFF' }, sz: 11 },
                    fill: { fgColor: { rgb: areaColor[meta.area] } },
                    alignment: { horizontal: 'center', vertical: 'center', wrapText: true },
                    border: {
                        left:   { style: 'thin',   color: { rgb: 'FFFFFF' } },
                        right:  { style: 'thin',   color: { rgb: 'FFFFFF' } },
                        bottom: { style: 'medium', color: { rgb: 'FFFFFF' } }
                    }
                };
            }

            const rowHeights = [{ hpt: 40 }];

            wsRows.forEach((wsRow, ri) => {
                const rowIdx = ri + 1;

                if (wsRow.type === 'subtotal') {
                    rowHeights.push({ hpt: 22 });
                    for (let ci = 0; ci < totalCols; ci++) {
                        const ref = XLSX.utils.encode_cell({ r: rowIdx, c: ci });
                        const val = wsRow.data[ci];
                        if (!ws[ref]) {
                            ws[ref] = { t: ci >= FIXED_COLS ? 'n' : 's', v: ci >= FIXED_COLS ? 0 : '' };
                        }
                        ws[ref].s = {
                            font: { bold: true, color: { rgb: '1E1B4B' }, sz: 10, italic: true },
                            fill: { fgColor: { rgb: 'DDD6FE' } },
                            alignment: { horizontal: ci >= FIXED_COLS ? 'center' : 'left', vertical: 'center' },
                            border: {
                                top:    { style: 'thin',  color: { rgb: '7C3AED' } },
                                bottom: { style: 'thin',  color: { rgb: '7C3AED' } },
                                left:   { style: 'hair',  color: { rgb: 'A78BFA' } },
                                right:  { style: 'hair',  color: { rgb: 'A78BFA' } }
                            }
                        };
                        if (ci >= FIXED_COLS) {
                            ws[ref].t = 'n';
                            ws[ref].v = typeof val === 'number' ? val : 0;
                            ws[ref].z = '0.##';
                        }
                    }
                    return;
                }

                if (wsRow.type === 'grandtotal') {
                    rowHeights.push({ hpt: 26 });
                    for (let ci = 0; ci < totalCols; ci++) {
                        const ref = XLSX.utils.encode_cell({ r: rowIdx, c: ci });
                        const val = wsRow.data[ci];
                        if (!ws[ref]) {
                            ws[ref] = { t: ci >= FIXED_COLS ? 'n' : 's', v: ci >= FIXED_COLS ? 0 : '' };
                        }
                        ws[ref].s = {
                            font: { bold: true, color: { rgb: 'FFFFFF' }, sz: 12 },
                            fill: { fgColor: { rgb: '065F46' } },
                            alignment: { horizontal: ci >= FIXED_COLS ? 'center' : 'left', vertical: 'center' },
                            border: {
                                top:    { style: 'medium', color: { rgb: '064E3B' } },
                                bottom: { style: 'medium', color: { rgb: '064E3B' } },
                                left:   { style: 'medium', color: { rgb: '064E3B' } },
                                right:  { style: 'medium', color: { rgb: '064E3B' } }
                            }
                        };
                        if (ci >= FIXED_COLS) {
                            ws[ref].t = 'n';
                            ws[ref].v = typeof val === 'number' ? val : 0;
                            ws[ref].z = '0.##';
                        }
                    }
                    return;
                }

                rowHeights.push({ hpt: 20 });
                const even = wsRow.even;
                for (let ci = 0; ci < totalCols; ci++) {
                    const ref = XLSX.utils.encode_cell({ r: rowIdx, c: ci });
                    if (!ws[ref]) continue;
                    const meta = colMeta[ci];
                    let bgRgb;
                    if (ci === TOTAL_COL)                       bgRgb = even ? 'D1FAE5' : 'ECFDF5';
                    else if (meta && meta.tipo === 'abierta')   bgRgb = even ? 'FFF7ED' : 'FEF3C7';
                    else if (meta && meta.tipo === 'entera')    bgRgb = even ? 'EDE9FE' : 'F5F3FF';
                    else                                         bgRgb = even ? 'F9FAFB' : 'FFFFFF';

                    ws[ref].s = {
                        fill: { fgColor: { rgb: bgRgb } },
                        alignment: { horizontal: ci >= FIXED_COLS ? 'center' : 'left', vertical: 'center' },
                        border: {
                            top:    { style: 'hair', color: { rgb: 'E5E7EB' } },
                            bottom: { style: 'hair', color: { rgb: 'E5E7EB' } },
                            left:   { style: 'hair', color: { rgb: 'E5E7EB' } },
                            right:  { style: 'hair', color: { rgb: 'E5E7EB' } }
                        }
                    };
                    if (ci >= FIXED_COLS) {
                        ws[ref].t = 'n';
                        ws[ref].z = '0.##';
                    }
                }
            });

            ws['!rows'] = rowHeights;
            ws['!ref'] = XLSX.utils.encode_range({ s: { r: 0, c: 0 }, e: { r: wsRows.length, c: totalCols - 1 } });

            XLSX.utils.book_append_sheet(wb, ws, 'Inventario');
            const fileName = 'inventario_' + new Date().toISOString().split('T')[0] + '.xlsx';
            XLSX.writeFile(wb, fileName);
            showNotification('✅ Excel exportado con grupos y totales');
        }

        document.getElementById('fileInput').addEventListener('change', function(e) {
            window.handleFileImport(e);
        });

        window.addEventListener('DOMContentLoaded', initializeApp);
    </script>

    while(arr.length > limit){

    }

}

        }catch(e){
